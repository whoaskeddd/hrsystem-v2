version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrsystem_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    image: python:3.12-slim
    container_name: hrsystem_backend_placeholder
    working_dir: /app
    command: >
      sh -c "echo 'Backend placeholder: второй разработчик добавит FastAPI сервис сюда.' && tail -f /dev/null"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
